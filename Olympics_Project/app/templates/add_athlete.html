<!--
    add_athlete.html — Form di inserimento di un nuovo atleta.
    Campi: dati personali (nome, sesso, età, altezza, peso, nazione, NOC)
    e dati competizione (edizione, anno, stagione, città, sport, evento, medaglia).
    Invia i dati via POST a /add_athlete per il salvataggio nel database.
-->
{% extends "base.html" %}

{% block title %}Olympia Manager — Nuovo Atleta{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container-narrow">
        <span class="section-label">Gestione</span>
        <h1>Registra una Nuova Leggenda</h1>
        <p>Compila il form per aggiungere un atleta all'archivio olimpico.</p>
    </div>
</div>

<section class="section" style="padding-top: 0;">
    <div class="container-narrow">
        <div class="form-olympia">
            <div class="form-card animate-in">
                <form action="/add_athlete" method="POST">

                    <div class="form-section-title">
                        <i class="fas fa-user"></i> Dati Personali e Fisici
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label-olympia" for="name">Nome Completo</label>
                            <input type="text" class="form-input-olympia" id="name" name="name" placeholder="es. Usain Bolt" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label-olympia" for="sex">Sesso</label>
                            <select class="form-select-olympia" id="sex" name="sex" required>
                                <option value="" disabled selected>Seleziona sesso</option>
                                <option value="M">Maschile</option>
                                <option value="F">Femminile</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label-olympia" for="age">Età</label>
                            <input type="number" class="form-input-olympia" id="age" name="age" placeholder="es. 25" min="10" max="100">
                        </div>
                        <div class="form-group">
                            <label class="form-label-olympia" for="height">Altezza (cm)</label>
                            <input type="number" class="form-input-olympia" id="height" name="height" placeholder="es. 185" min="100" max="250">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label-olympia" for="weight">Peso (kg)</label>
                        <input type="number" step="0.1" class="form-input-olympia" id="weight" name="weight" placeholder="es. 76.5" min="30" max="250">
                    </div>

                    <div class="form-divider"></div>

                    <div class="form-section-title">
                        <i class="fas fa-medal"></i> Dati Competizione
                    </div>

                    <div class="form-group">
                        <label class="form-label-olympia" for="noc">Nazione Rappresentata</label>
                        <select class="form-select-olympia" id="noc" name="noc" required>
                            <option value="" disabled selected>Cerca e seleziona una nazione...</option>
                            {% for n in nations %}
                                <option value="{{ n.noc }}">{{ n.region }} ({{ n.noc }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label-olympia" for="game_id">Edizione dei Giochi</label>
                        <select class="form-select-olympia" id="game_id" name="game_id" required>
                            <option value="" disabled selected>Seleziona l'edizione olimpica...</option>
                            {% for g in games %}
                                <option value="{{ g.game_id }}">{{ g.game_name }} ({{ g.city }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label-olympia" for="event_id">Sport e Disciplina</label>
                        <select class="form-select-olympia" id="event_id" name="event_id" required>
                            <option value="" disabled selected>Seleziona la disciplina esatta...</option>
                            {% for e in events %}
                                <option value="{{ e.event_id }}">{{ e.sport }} &mdash; {{ e.event_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label-olympia" for="medal">Medaglia Vinta</label>
                        <select class="form-select-olympia" id="medal" name="medal">
                            <option value="NA" selected>Nessuna medaglia</option>
                            <option value="Gold">Oro</option>
                            <option value="Silver">Argento</option>
                            <option value="Bronze">Bronzo</option>
                        </select>
                    </div>

                    <div class="form-divider"></div>

                    <div style="display: flex; gap: 1rem; justify-content: flex-end; align-items: center;">
                        <a href="/athletes" class="btn-olympia btn-outline-olympia btn-sm">
                            <i class="fas fa-times"></i> Annulla
                        </a>
                        <button type="submit" class="btn-olympia btn-primary-olympia">
                            <i class="fas fa-save"></i> Salva Atleta
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
